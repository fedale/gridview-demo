fedale_gridview:
    # Framework theme: this demo is a Bootstrap 5 app (it loads Bootstrap CSS and
    # uses data-bs-theme), so the grid emits real Bootstrap classes for its leaf
    # elements (buttons) and follows Bootstrap's palette/dark mode via the preset.
    # Set to 'default' for the agnostic gv-* look, or 'tailwind' for utilities.
    theme: bootstrap5

    # Instant client-side i18n: ship the EN/ES/FR/IT catalogs to the browser. The demo
    # already exposes a locale in the route ({_locale}), so the in-grid switcher
    # stays off — the host drives the locale.
    i18n:
        locales: [en, es, fr, it]
        default: en
        client_domain: messages
        lang_switcher: true

    defaults:
        options:
            emptyText: 'No records found'
            useTurbo: true
            showThead: true
            showTfoot: true
        attributes:
            class: 'table table-striped'

    gridviews: {}
